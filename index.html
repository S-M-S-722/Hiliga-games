        function saveUser() {

            document.getElementById("welcomeProfileName").innerText = profileName;

            } else {

                av.style.background = "linear-gradient(135deg, #ff2a6d, #05ffa1)";

        }

        function showHome() {
            document.getElementById("dynamicMainArea").innerHTML = `
                <div class="hero-banner"><img id="bannerImage" src="https://ik.imagekit.io/shaz/ChatGPT%20Image%20Jun%208,%202026,%2006_08_27%20PM.png" style="width:100%;"></div>

                    <div class="big-card" id="playersHomeBtn"><i class="fas fa-users"></i><h3>PLAYERS</h3></div>
                    <div class="big-card" id="gameplanHomeBtn"><i class="fas fa-chalkboard-user"></i><h3>GAME PLAN</h3></div>
                    <div class="big-card" id="matchesHomeBtn"><i class="fas fa-futbol"></i><h3>MATCHES</h3></div>
                </div>
                <div class="contact-footer"><i class="fas fa-envelope"></i> hikmanric18@gmail.com</div>
            `;
            document.getElementById("playersHomeBtn")?.addEventListener("click", () => navigateTo("players"));
            document.getElementById("gameplanHomeBtn")?.addEventListener("click", () => navigateTo("gameplan"));
            document.getElementById("matchesHomeBtn")?.addEventListener("click", () => navigateTo("matches"));
            startBanner();
        }

        let bannerInterval;

        function startBanner() {
            if (bannerInterval) clearInterval(bannerInterval);
            let banners = ["https://ik.imagekit.io/shaz/ChatGPT%20Image%20Jun%208,%202026,%2006_08_27%20PM.png", "https://ik.imagekit.io/shaz/ChatGPT%20Image%20Jun%208,%202026,%2006_34_06%20PM.png"];
            let i = 0;
            bannerInterval = setInterval(() => {
                let img = document.getElementById("bannerImage");
                if (img) {
                    img.style.opacity = "0";
                    setTimeout(() => {
                        i = (i + 1) % banners.length;
                        img.src = banners[i];
                        img.style.opacity = "1";
                    }, 150);
                }
            }, 4500);
        }

        // Navigation function - loads pages from separate HTML files
        function navigateTo(page) {
            const mainArea = document.getElementById("dynamicMainArea");
            // Load the page content from the corresponding file
            fetch(`${page}.html`)
                .then(response => response.text())
                .then(html => {
                    mainArea.innerHTML = html;
                    // Execute any scripts in the loaded content
                    const scripts = mainArea.querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        newScript.textContent = oldScript.textContent;
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });
                })
                .catch(() => {
                    // Fallback if file not found - load inline
                    if (page === 'players') renderPlayersPage();
                    else if (page === 'gameplan') renderGamePlanPage();
                    else if (page === 'draft') renderDraftPage();
                    else if (page === 'matches') renderMatchesPage();
                    else if (page === 'leaderboard') renderLeaderboardPage();
                    else if (page === 'events') renderEventsPage();
                    else showHome();
                });
        }

        // ----- INLINE RENDER FUNCTIONS (fallback) -----
        function renderPlayersPage() {
            document.getElementById("dynamicMainArea").innerHTML = `<div class="players-page-container"><h3 style="font-family:'Black Ops One','Inter',sans-serif;font-weight:400;letter-spacing:0.5px;color:#05ffa1;"><i class="fas fa-users"></i> MY COLLECTION</h3><div class="players-list">${myPlayers.map(p => `<div class="player-row" data-player='${JSON.stringify(p).replace(/'/g,"&#39;")}'><div style="position:relative;display:inline-block;"><img class="player-small-img" src="${p.image}" onerror="this.src='https://via.placeholder.com/70'"><span class="collection-ovr-badge">${getPlayerOverall(p)}</span></div><div class="player-info-area"><div class="player-name-text">${p.name.toUpperCase()}</div><div class="level-small"><span class="level-badge">LEVEL ${p.level||1}/32</span></div></div></div>`).join('') || '<div style="padding:20px;text-align:center;font-family:Black Ops One,Inter,sans-serif;font-weight:400;letter-spacing:0.5px;">No players yet. SPIN THE PACK!</div>'}</div></div>`;

                .level-small { font-size:0.7rem; color:#a8b3cf; display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-family:'Black Ops One','Inter',sans-serif; font-weight:400; letter-spacing:0.5px; }

        function getPlayerOverall(player) {
            if (!player.stats) {
                const config = playerStatsConfig[player.name];
                if (config) player.stats = { ...config };
                else player.stats = { attackingAwareness: 40 + Math.floor(Math.random() * 10), ballControl: 40 + Math.floor(Math.random() * 10), dribbling: 40 + Math.floor(Math.random() * 10), tightPossession: 40 + Math.floor(Math.random() * 10) };
            }
            const base = playerStatsConfig[player.name];
            if (!base) return Math.round((player.stats.attackingAwareness + player.stats.ballControl + player.stats.dribbling + player.stats.tightPossession) / 4);
            const baseOvr = Math.round((base.attackingAwareness + base.ballControl + base.dribbling + base.tightPossession) / 4);
            const bonus = getOvrBonus(player.level || 1);
            const inc = (player.stats.attackingAwareness - base.attackingAwareness) + (player.stats.ballControl - base.ballControl) + (player.stats.dribbling - base.dribbling) + (player.stats.tightPossession - base.tightPossession);
            return Math.round(baseOvr + (inc / 4) + bonus);
        }

        function getOvrBonus(level) {
            if (level >= 32) return 4;
            if (level >= 24) return 3;
            if (level >= 16) return 2;
            if (level >= 8) return 1;
            return 0;
        }

        function getPlayerByName(name) { return myPlayers.find(p => p.name === name); }

        function showPlayerDetail(player) {
            // For now, show toast with player info
            showToast(`Viewing ${player.name} - OVR: ${getPlayerOverall(player)}`);
            // In full implementation, this would open the detail modal
        }

        function renderGamePlanPage() {
            document.getElementById("dynamicMainArea").innerHTML = `<div class="gameplan-container"><h2 style="color:#05ffa1;font-family:'Black Ops One',sans-serif;font-weight:400;letter-spacing:0.5px;"><i class="fas fa-chalkboard-user"></i> GAME PLAN</h2><p style="color:#7a85a0;">Game Plan page loaded.</p></div>`;
        }

        function renderDraftPage() {
            document.getElementById("dynamicMainArea").innerHTML = `<div class="draft-page-container"><div class="pack-card"><div class="pack-header"><strong>ALL ROUNDERS</strong><div class="more-details-btn" id="moreDetailsBtn">MORE DETAILS</div></div><div class="pack-image-area"><img class="pack-full-image" src="https://ik.imagekit.io/shaz/All%20Rounders%20(1).jpg" alt="pack"></div><div class="pack-stats"><div class="remaining-box">REMAINING: <span id="remainingCount">${remainingPackCount}</span></div><button class="spin-button" id="spinBtn">SPIN x 100</button></div></div></div>`;
            document.getElementById("moreDetailsBtn")?.addEventListener("click", () => showToast("Pack details"));
            document.getElementById("spinBtn")?.addEventListener("click", performPackSpin);
        }

        function performPackSpin() {
            if (remainingPackCount <= 0) { showToast("No spins left!"); return; }
            if (currentCoins < 100) { showToast(`Need 100 coins! You have ${currentCoins}`); return; }
            currentCoins -= 100;
            remainingPackCount--;
            const newPlayer = packPlayersData[Math.floor(Math.random() * packPlayersData.length)];
            const existing = myPlayers.find(p => p.name === newPlayer.name);
            if (existing) {
                existing.level = Math.min(existing.level + 1, 32);
                showToast(`${newPlayer.name} level up!`);
            } else {
                const stats = playerStatsConfig[newPlayer.name] || { attackingAwareness: 40 + Math.floor(Math.random() * 10), ballControl: 40 + Math.floor(Math.random() * 10), dribbling: 40 + Math.floor(Math.random() * 10), tightPossession: 40 + Math.floor(Math.random() * 10) };
                myPlayers.push({ name: newPlayer.name, image: playerImages[newPlayer.name] || newPlayer.image, level: 1, trainingUsed: { 50: 0, 100: 0, 150: 0 }, stats: stats });
            }
            saveUser();
            updateUI();
            const remainingSpan = document.getElementById("remainingCount");
            if (remainingSpan) remainingSpan.innerHTML = remainingPackCount;
            showToast(`You got ${newPlayer.name}!`);
        }

        function renderMatchesPage() {
            document.getElementById("dynamicMainArea").innerHTML = `<div class="matches-container"><h2 style="color:#05ffa1;font-family:'Black Ops One',sans-serif;font-weight:400;letter-spacing:0.5px;"><i class="fas fa-futbol"></i> MATCHES</h2><p style="color:#7a85a0;">Matches page - coming soon!</p></div>`;
        }

        function renderLeaderboardPage() {
            document.getElementById("dynamicMainArea").innerHTML = `<div class="leaderboard-container"><h2 style="color:#05ffa1;font-family:'Black Ops One',sans-serif;font-weight:400;letter-spacing:0.5px;"><i class="fas fa-trophy"></i> LEADERBOARD</h2><div class="empty-state" style="color:#7a85a0;font-family:'Black Ops One',sans-serif;font-weight:400;letter-spacing:0.5px;"><i class="fas fa-users" style="font-size:3rem;display:block;margin-bottom:16px;color:#ff2a6d40;"></i><p>No leaderboard data available yet.</p></div></div>`;
        }

        function renderEventsPage() {
            document.getElementById("dynamicMainArea").innerHTML = `<div class="events-container"><h2 style="color:#05ffa1;font-family:'Black Ops One',sans-serif;font-weight:400;letter-spacing:0.5px;"><i class="fas fa-calendar-alt"></i> EVENTS</h2><div class="empty-state" style="color:#7a85a0;font-family:'Black Ops One',sans-serif;font-weight:400;letter-spacing:0.5px;"><i class="fas fa-calendar-plus" style="font-size:3rem;display:block;margin-bottom:16px;color:#05ffa140;"></i><p>No upcoming events at the moment.</p></div></div>`;
        }

        // ----- AUTH -----
        function showSignupPanel() {
            document.getElementById("loginContainer").style.display = "none";
            document.getElementById("signupContainer").style.display = "flex";
        }

        function hideSignup() {
            document.getElementById("signupContainer").style.display = "none";
            document.getElementById("loginContainer").style.display = "flex";
            document.getElementById("signupError").innerText = "";
        }

        function handleSignup() {
            let u = document.getElementById("signupUsername").value.trim(),
                p = document.getElementById("signupPassword").value.trim();
            if (!u || !p) { document.getElementById("signupError").innerText = "Fill fields"; return; }
            if (internalAccounts[u]) { document.getElementById("signupError").innerText = "Exists"; return; }
            internalAccounts[u] = { password: p, coins: 534, profileName: u, avatar: "user-circle", photoData: null, players: [], gamePlan: { teamName: "", logo: "", positions: {} } };
            saveAccounts();
            alert("Account created!");
            hideSignup();
        }

        function handleLogin() {
            let u = document.getElementById("loginUsername").value.trim(),
                p = document.getElementById("loginPassword").value.trim();
            if (!internalAccounts[u] || internalAccounts[u].password !== p) { document.getElementById("loginError").innerText = "Invalid"; return; }
            currentUser = u;
            let data = internalAccounts[currentUser];
            currentCoins = data.coins;
            profileName = data.profileName;
            selectedAvatar = data.avatar;
            uploadedImageData = data.photoData;
            myPlayers = data.players || [];
            remainingPackCount = 12;
            document.getElementById("loginContainer").style.display = "none";
            document.getElementById("appContainer").style.display = "block";
            updateUI();
            showHome();
            startBanner();
            showToast(`Welcome ${profileName}!`);
        }

        // Event Listeners
        document.getElementById("homeIconBtn")?.addEventListener("click", () => { showHome();
            startBanner(); });
        document.getElementById("sideProfileName")?.addEventListener("click", () => {
            let n = prompt("Edit name:", profileName);
            if (n?.trim()) { profileName = n.trim();
                updateUI();
                saveUser();
                showToast(`Name changed`); }
        });
        document.getElementById("topCoinsDisplay")?.addEventListener("click", () => showToast(`💰 Balance: ${currentCoins}`));
        document.getElementById("draftNavBtn")?.addEventListener("click", () => navigateTo("draft"));
        document.getElementById("playersNavBtn")?.addEventListener("click", () => navigateTo("players"));
        document.getElementById("homeNavBtn")?.addEventListener("click", () => navigateTo("events"));

        loadAccounts();
        document.getElementById("appContainer").style.display = "none";
    </script>
</body>
</html>
